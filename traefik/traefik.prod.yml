# Traefik Production Static Configuration
# - HTTP on :80 redirects to HTTPS
# - HTTPS on :443 with automatic Let's Encrypt certificates
# - ACME via HTTP-01 challenge (requires ports 80/443 publicly reachable)

api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ':443'
    http:
      tls:
        certResolver: letsencrypt

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${TRAEFIK_ACME_EMAIL}
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO

accessLog: {}
